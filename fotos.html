<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Optiglass Foto</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --blauw: #1e3a5f;
    --accent: #2d6ef7;
    --groen: #16a34a;
    --rood: #dc2626;
    --oranje: #f59e0b;
    --bg: #f0f4f8;
    --card: #ffffff;
    --border: #e2e8f0;
    --text: #1a202c;
    --muted: #718096;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: -webkit-fill-available;
  }

  /* HEADER */
  .header {
    background: var(--blauw);
    padding: 52px 20px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .header-logo {
    width: 36px;
    height: 36px;
    background: white;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .header-title { color: white; font-size: 18px; font-weight: 700; }
  .header-sub { color: rgba(255,255,255,.6); font-size: 12px; }

  /* MAIN */
  .main { padding: 20px 16px; max-width: 480px; margin: 0 auto; }

  /* CARD */
  .card {
    background: var(--card);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 16px;
    box-shadow: 0 1px 3px rgba(0,0,0,.06);
  }
  .card-title {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--muted);
    margin-bottom: 12px;
  }

  /* INPUT */
  .input-wrap { position: relative; margin-bottom: 4px; }
  .input-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); pointer-events: none; }
  input {
    width: 100%;
    padding: 14px 14px 14px 40px;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    font-size: 16px;
    font-family: inherit;
    background: #f8fafc;
    color: var(--text);
    outline: none;
    transition: border-color .15s;
  }
  input:focus { border-color: var(--accent); background: white; }
  input::placeholder { color: var(--muted); }

  /* JOB INFO */
  .job-info {
    display: none;
    background: #eff6ff;
    border: 1.5px solid #bfdbfe;
    border-radius: 12px;
    padding: 14px 16px;
    margin-top: 12px;
  }
  .job-info.zichtbaar { display: block; }
  .job-naam { font-size: 15px; font-weight: 700; color: var(--blauw); }
  .job-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .job-niet-gevonden {
    display: none;
    background: #fef2f2;
    border: 1.5px solid #fecaca;
    border-radius: 12px;
    padding: 14px 16px;
    margin-top: 12px;
    font-size: 13px;
    color: var(--rood);
  }
  .job-niet-gevonden.zichtbaar { display: block; }

  /* FOTO VAKJES */
  .foto-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .foto-vak {
    position: relative;
    aspect-ratio: 1;
    border-radius: 14px;
    overflow: hidden;
    background: #f8fafc;
    border: 2px dashed var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    cursor: pointer;
    transition: border-color .15s, background .15s;
    -webkit-user-select: none;
    user-select: none;
  }
  .foto-vak:active { background: #f0f4f8; border-color: var(--accent); }
  .foto-vak.heeft-foto { border-style: solid; border-color: var(--accent); }
  .foto-vak img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .foto-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: var(--muted);
    position: relative;
    z-index: 1;
  }
  .foto-vak.heeft-foto .foto-label { display: none; }
  .foto-vak.heeft-foto::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,.4) 0%, transparent 50%);
  }
  .foto-badge {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    background: white;
    color: var(--text);
    font-size: 10px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
    white-space: nowrap;
    z-index: 2;
    display: none;
  }
  .foto-vak.heeft-foto .foto-badge { display: block; }
  .foto-verwijder {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 26px;
    height: 26px;
    background: rgba(0,0,0,.5);
    border-radius: 50%;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 3;
    border: none;
    cursor: pointer;
    color: white;
    font-size: 14px;
    line-height: 1;
  }
  .foto-vak.heeft-foto .foto-verwijder { display: flex; }

  /* BUTTON */
  .btn-opslaan {
    width: 100%;
    padding: 16px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 14px;
    font-size: 16px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: opacity .15s, transform .1s;
    -webkit-user-select: none;
  }
  .btn-opslaan:active { opacity: .85; transform: scale(.98); }
  .btn-opslaan:disabled { opacity: .4; cursor: not-allowed; }
  .btn-opslaan.succes { background: var(--groen); }

  /* STATUS */
  .status {
    text-align: center;
    font-size: 13px;
    color: var(--muted);
    padding: 8px 0;
    min-height: 28px;
  }
  .status.ok { color: var(--groen); font-weight: 600; }
  .status.fout { color: var(--rood); font-weight: 600; }
  .status.bezig { color: var(--accent); }

  /* LOADER */
  .spinner {
    width: 18px; height: 18px;
    border: 2.5px solid rgba(255,255,255,.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* NAAM RESULTATEN */
  .naam-resultaat {
    padding: 12px 14px;
    border-radius: 10px;
    margin-bottom: 6px;
    background: #f8fafc;
    border: 1.5px solid var(--border);
    cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .naam-resultaat:active { background: #eff6ff; border-color: var(--accent); }
  .naam-resultaat-klant { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
  .naam-resultaat-jobs { font-size: 12px; color: var(--muted); }
  .naam-resultaat-ob {
    display: inline-block;
    background: #eff6ff;
    color: var(--accent);
    font-size: 11px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 20px;
    margin: 2px 3px 2px 0;
    cursor: pointer;
  }

  /* RECENTE JOBS */
  .recente-job {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
  }
  .recente-job:last-child { border-bottom: none; }
  .recente-job:active { opacity: .7; }
  .rj-ob {
    font-size: 11px;
    font-weight: 700;
    color: var(--accent);
    min-width: 80px;
  }
  .rj-naam { font-size: 13px; font-weight: 600; flex: 1; }
  .rj-fotos { display: flex; gap: 4px; }
  .rj-fotos img {
    width: 30px; height: 30px;
    border-radius: 6px;
    object-fit: cover;
    border: 1px solid var(--border);
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">
    <svg width="22" height="22" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="100" cy="100" rx="90" ry="55" stroke="#1e3a5f" stroke-width="18" fill="none"/>
      <circle cx="100" cy="100" r="28" fill="#2d6ef7"/>
      <circle cx="100" cy="100" r="14" fill="#1e3a5f"/>
    </svg>
  </div>
  <div>
    <div class="header-title">Optiglass Foto</div>
    <div class="header-sub">Foto's voor / na herstel</div>
  </div>
</div>

<div class="main">

  <!-- ZOEK -->
  <div class="card">
    <div class="card-title">Opdracht opzoeken</div>
    <div id="laad-status" style="display:none;font-size:12px;color:var(--muted);margin-bottom:8px;text-align:center;">Laden...</div>

    <!-- TABS -->
    <div style="display:flex;gap:0;background:#f0f4f8;border-radius:10px;padding:3px;margin-bottom:14px;">
      <button id="tab-ob" onclick="setZoekTab('ob')" style="flex:1;padding:8px;border:none;border-radius:8px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;background:white;color:#1e3a5f;box-shadow:0 1px 3px rgba(0,0,0,.1);transition:all .15s;">
        Orderbon
      </button>
      <button id="tab-naam" onclick="setZoekTab('naam')" style="flex:1;padding:8px;border:none;border-radius:8px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;background:transparent;color:#718096;transition:all .15s;">
        Klantnaam
      </button>
    </div>

    <!-- ORDERBON INPUT -->
    <div id="zoek-ob-wrap">
      <div class="input-wrap">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#718096" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 9h6M9 13h4"/></svg>
        <input type="text" id="zoek-ob-input" placeholder="OB-2026-..." oninput="zoekJob(this.value)" autocomplete="off" autocorrect="off" autocapitalize="characters">
      </div>
    </div>

    <!-- NAAM INPUT -->
    <div id="zoek-naam-wrap" style="display:none;">
      <div class="input-wrap">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#718096" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <input type="text" id="zoek-naam-input" placeholder="Naam klant of optiek..." oninput="zoekOpNaam(this.value)" autocomplete="off">
      </div>
      <!-- RESULTATEN LIJST -->
      <div id="naam-resultaten" style="margin-top:8px;display:none;"></div>
    </div>

    <div class="job-info" id="job-info">
      <div class="job-naam" id="job-naam"></div>
      <div class="job-meta" id="job-meta"></div>
    </div>
    <div class="job-niet-gevonden" id="job-niet-gevonden">Niet gevonden</div>
  </div>

  <!-- FOTO'S -->
  <div class="card" id="foto-card" style="display:none;">
    <div class="card-title">Foto's toevoegen</div>
    <div class="foto-grid">

      <!-- VOOR -->
      <div class="foto-vak" id="vak-voor" onclick="kiesFoto('voor')">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#cbd5e0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/>
        </svg>
        <div class="foto-label">Voor</div>
        <img id="img-voor" src="" style="display:none;">
        <div class="foto-badge">Voor herstel</div>
        <button class="foto-verwijder" onclick="verwijderFoto(event,'voor')">×</button>
      </div>

      <!-- NA -->
      <div class="foto-vak" id="vak-na" onclick="kiesFoto('na')">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#cbd5e0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/>
        </svg>
        <div class="foto-label">Na</div>
        <img id="img-na" src="" style="display:none;">
        <div class="foto-badge">Na herstel</div>
        <button class="foto-verwijder" onclick="verwijderFoto(event,'na')">×</button>
      </div>

    </div>

    <input type="file" id="file-input" accept="image/*" capture="environment" style="display:none;" onchange="verwerkFoto(event)">

    <div class="status" id="status"></div>

    <button class="btn-opslaan" id="btn-opslaan" onclick="opslaan()" disabled>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      Foto's opslaan
    </button>
  </div>

  <!-- RECENTE MET FOTOS -->
  <div class="card" id="recente-card" style="display:none;">
    <div class="card-title">Opgeslagen foto's</div>
    <div id="recente-lijst"></div>
  </div>

</div>

<script>
const SUPABASE_URL = 'https://cbvauuubuwcqzmesxwpj.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNidmF1dXVidXdjcXptZXN4d3BqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0MzExMjcsImV4cCI6MjA5MjAwNzEyN30.NF9X6T3Wg7knekChn1tbsj_kSfDwpo_lG97g0hkrWfU';

let huidigJobId = null;
let fotoTarget = null;
let fotoVoor = null;
let fotoNa = null;
let alleJobs = [];
let alleClients = [];

// Laad jobs en clients uit Supabase
async function laadJobs() {
  const statusEl = document.getElementById('laad-status');
  if (statusEl) { statusEl.textContent = 'Laden...'; statusEl.style.display = 'block'; }
  try {
    // Laad jobs
    const jobRes = await fetch(SUPABASE_URL + '/rest/v1/jobs?select=*&limit=1000', {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
    });
    const jobData = await jobRes.json();
    // Supabase slaat op als {id, data: {...}} — haal de inner data op maar bewaar het id
    alleJobs = jobData.map(r => {
      const j = r.data || r;
      if (!j.id && r.id) j.id = r.id;
      return j;
    }).filter(j => j && j.type && j.type !== 'Verzending');

    // Laad clients uit Supabase settings (worden als array opgeslagen)
    const settRes = await fetch(SUPABASE_URL + '/rest/v1/settings?id=eq.main', {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
    });
    const settData = await settRes.json();
    if (settData.length && settData[0].data && settData[0].data.clients) {
      alleClients = settData[0].data.clients;
    }

    // Fallback: laad clients uit aparte tabel
    if (!alleClients.length) {
      const clRes = await fetch(SUPABASE_URL + '/rest/v1/clients_custom?select=*&limit=1000', {
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
      });
      const clData = await clRes.json();
      alleClients = clData.map(r => r.data || r).filter(Boolean);
    }

    if (statusEl) statusEl.style.display = 'none';
    console.log('Geladen:', alleJobs.length, 'jobs,', alleClients.length, 'clients');
    toonRecente();
  } catch(e) {
    if (statusEl) { statusEl.textContent = 'Laden mislukt — controleer verbinding'; }
    console.error('Laden mislukt:', e);
  }
}

function clientNaam(clientId) {
  const c = alleClients.find(c => c.id === clientId);
  return c ? c.naam : '';
}

// Tab wisselen
let actieveTab = 'ob';
function setZoekTab(tab) {
  actieveTab = tab;
  document.getElementById('zoek-ob-wrap').style.display = tab === 'ob' ? 'block' : 'none';
  document.getElementById('zoek-naam-wrap').style.display = tab === 'naam' ? 'block' : 'none';
  // Tabs stylen
  const tabOb = document.getElementById('tab-ob');
  const tabNaam = document.getElementById('tab-naam');
  tabOb.style.background = tab === 'ob' ? 'white' : 'transparent';
  tabOb.style.color = tab === 'ob' ? '#1e3a5f' : '#718096';
  tabOb.style.boxShadow = tab === 'ob' ? '0 1px 3px rgba(0,0,0,.1)' : 'none';
  tabNaam.style.background = tab === 'naam' ? 'white' : 'transparent';
  tabNaam.style.color = tab === 'naam' ? '#1e3a5f' : '#718096';
  tabNaam.style.boxShadow = tab === 'naam' ? '0 1px 3px rgba(0,0,0,.1)' : 'none';
  // Reset
  resetZoek();
}

function resetZoek() {
  huidigJobId = null;
  document.getElementById('job-info').className = 'job-info';
  document.getElementById('job-niet-gevonden').className = 'job-niet-gevonden';
  document.getElementById('foto-card').style.display = 'none';
  document.getElementById('naam-resultaten').style.display = 'none';
  fotoVoor = null; fotoNa = null;
  toonFotoInVak('voor', null); toonFotoInVak('na', null);
  updateKnop();
}

// Zoek op klantnaam
let naamTimer = null;
function zoekOpNaam(val) {
  clearTimeout(naamTimer);
  const resultEl = document.getElementById('naam-resultaten');
  if (!val || val.length < 2) { resultEl.style.display = 'none'; resetZoek(); return; }

  naamTimer = setTimeout(function() {
    const clients = alleClients;
    const zoekLower = val.toLowerCase();

    // Vind matching clients
    const matchClients = clients.filter(c =>
      (c.naam||'').toLowerCase().includes(zoekLower)
    ).slice(0, 8);

    if (!matchClients.length) {
      resultEl.innerHTML = '<div style="color:var(--muted);font-size:13px;padding:8px 0;">Geen klanten gevonden</div>';
      resultEl.style.display = 'block';
      return;
    }

    resultEl.style.display = 'block';
    resultEl.innerHTML = matchClients.map(c => {
      // Vind jobs van deze klant
      const clientJobs = alleJobs.filter(j => j.clientId === c.id && j.orderbon)
        .sort((a,b) => (b.datum||'').localeCompare(a.datum||''))
        .slice(0, 5);

      return '<div class="naam-resultaat">'
        + '<div class="naam-resultaat-klant">' + c.naam + '</div>'
        + '<div class="naam-resultaat-jobs">'
          + (clientJobs.length
            ? clientJobs.map(j =>
                '<span class="naam-resultaaselecteerJobId(\'' + j.id + '\')">'
                + j.orderbon + '</span>'
              ).join('')
            : '<span style="color:var(--muted);">Geen opdrachten</span>'
          )
        + '</div>'
      + '</div>';
    }).join('');
  }, 250);
}

function selecteerJobId(jobId) {
  const job = alleJobs.find(j => j.id === jobId);
  if (!job || !job.orderbon) return;
  // Wissel naar orderbon tab en vul in
  setZoekTab('ob');
  const input = document.getElementById('zoek-ob-input');
  input.value = job.orderbon;
  zoekJob(job.orderbon);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Zoek job op orderbonnummer
let zoekTimer = null;
function zoekJob(val) {
  clearTimeout(zoekTimer);
  val = val.trim().toUpperCase();
  const infoEl = document.getElementById('job-info');
  const nfEl = document.getElementById('job-niet-gevonden');
  const fotoCard = document.getElementById('foto-card');

  if (!val || val.length < 3) {
    infoEl.className = 'job-info';
    nfEl.className = 'job-niet-gevonden';
    fotoCard.style.display = 'none';
    huidigJobId = null;
    updateKnop();
    return;
  }

  zoekTimer = setTimeout(function() {
    // Zoek op orderbon nummer
    const job = alleJobs.find(j =>
      (j.orderbon||'').toUpperCase() === val ||
      (j.orderbon||'').toUpperCase().includes(val)
    );

    if (job) {
      huidigJobId = job.id;
      document.getElementById('job-naam').textContent = job.beschrijving || '—';
      const clientN = clientNaam(job.clientId);
      document.getElementById('job-meta').textContent =
        (clientN ? clientN + ' · ' : '') + (job.orderbon || '') + ' · ' + (job.datum || '');
      infoEl.className = 'job-info zichtbaar';
      nfEl.className = 'job-niet-gevonden';
      fotoCard.style.display = 'block';

      // Laad bestaande foto's
      fotoVoor = job.fotoVoor || null;
      fotoNa = job.fotoNa || null;
      toonFotoInVak('voor', fotoVoor);
      toonFotoInVak('na', fotoNa);
      updateKnop();
    } else {
      huidigJobId = null;
      infoEl.className = 'job-info';
      nfEl.className = 'job-niet-gevonden zichtbaar';
      fotoCard.style.display = 'none';
      updateKnop();
    }
  }, 300);
}

function kiesFoto(type) {
  fotoTarget = type;
  const input = document.getElementById('file-input');
  input.value = '';
  input.click();
}

function verwerkFoto(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement('canvas');
      const maxW = 1200;
      const scale = img.width > maxW ? maxW / img.width : 1;
      canvas.width = Math.round(img.width * scale);
      canvas.height = Math.round(img.height * scale);
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      const base64 = canvas.toDataURL('image/jpeg', 0.75);
      if (fotoTarget === 'voor') fotoVoor = base64;
      else fotoNa = base64;
      toonFotoInVak(fotoTarget, base64);
      updateKnop();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function toonFotoInVak(type, base64) {
  const vak = document.getElementById('vak-' + type);
  const img = document.getElementById('img-' + type);
  if (base64) {
    img.src = base64;
    img.style.display = 'block';
    vak.classList.add('heeft-foto');
  } else {
    img.src = '';
    img.style.display = 'none';
    vak.classList.remove('heeft-foto');
  }
}

function verwijderFoto(event, type) {
  event.stopPropagation();
  if (type === 'voor') fotoVoor = null;
  else fotoNa = null;
  toonFotoInVak(type, null);
  updateKnop();
}

function updateKnop() {
  const btn = document.getElementById('btn-opslaan');
  btn.disabled = !huidigJobId || (!fotoVoor && !fotoNa);
}

async function opslaan() {
  if (!huidigJobId) return;
  const btn = document.getElementById('btn-opslaan');
  const statusEl = document.getElementById('status');

  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Opslaan...';
  statusEl.className = 'status bezig';
  statusEl.textContent = 'Foto\'s worden opgeslagen...';

  try {
    // Haal huidige job op
    const res = await fetch(SUPABASE_URL + '/rest/v1/jobs?id=eq.' + huidigJobId, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
    });
    const rows = await res.json();
    if (!rows.length) throw new Error('Job niet gevonden');

    const job = rows[0].data || rows[0];
    job.fotoVoor = fotoVoor;
    job.fotoNa = fotoNa;

    // Sla op
    const saveRes = await fetch(SUPABASE_URL + '/rest/v1/jobs?id=eq.' + huidigJobId, {
      method: 'PATCH',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY,
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify({ data: job })
    });

    if (!saveRes.ok) throw new Error('Opslaan mislukt: ' + saveRes.status);

    // Succes
    btn.className = 'btn-opslaan succes';
    btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg> Opgeslagen!';
    statusEl.className = 'status ok';
    statusEl.textContent = 'Foto\'s zijn opgeslagen en zichtbaar in de cockpit.';

    // Update lokale cache
    const idx = alleJobs.findIndex(j => j.id === huidigJobId);
    if (idx !== -1) { alleJobs[idx].fotoVoor = fotoVoor; alleJobs[idx].fotoNa = fotoNa; }
    toonRecente();

    // Reset na 2 seconden
    setTimeout(function() {
      btn.className = 'btn-opslaan';
      btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> Foto\'s opslaan';
      btn.disabled = false;
      statusEl.className = 'status';
      statusEl.textContent = '';
    }, 2500);

  } catch(e) {
    btn.className = 'btn-opslaan';
    btn.innerHTML = 'Probeer opnieuw';
    btn.disabled = false;
    statusEl.className = 'status fout';
    statusEl.textContent = 'Fout: ' + e.message;
    console.error(e);
  }
}

function toonRecente() {
  const metFotos = alleJobs.filter(j => j.fotoVoor || j.fotoNa)
    .sort((a,b) => (b.datum||'').localeCompare(a.datum||''))
    .slice(0, 5);

  const card = document.getElementById('recente-card');
  const lijst = document.getElementById('recente-lijst');

  if (!metFotos.length) { card.style.display = 'none'; return; }
  card.style.display = 'block';

  const clients = alleClients;
  lijst.innerHTML = metFotos.map(j => {
    const cl = clients.find(c => c.id === j.clientId);
    return '<div class="recente-job" onclick="selecteerJob(\'' + j.orderbon + '\')">'
      + '<div class="rj-ob">' + (j.orderbon || '—') + '</div>'
      + '<div class="rj-naam">' + (j.beschrijving || (cl ? cl.naam : '—')).substring(0, 30) + '</div>'
      + '<div class="rj-fotos">'
        + (j.fotoVoor ? '<img src="' + j.fotoVoor + '">' : '')
        + (j.fotoNa ? '<img src="' + j.fotoNa + '">' : '')
      + '</div>'
    + '</div>';
  }).join('');
}

function selecteerJob(orderbon) {
  setZoekTab('ob');
  const input = document.getElementById('zoek-ob-input');
  input.value = orderbon;
  zoekJob(orderbon);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Start
laadJobs();
</script>
